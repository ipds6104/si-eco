services:
  app:
    build:
      context: .
      target: final
    image: si-aksi-app
    restart: always
    ports:
      - "${PORT_APP:-8100}:8000"
    # Volumes dihapus untuk produksi agar tidak menimpa kode di dalam image
    # volumes:
    #   - .:/app
    # Command dikelola oleh CMD di Dockerfile (php artisan octane:start --port=8000)
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - OCTANE_SERVER=frankenphp
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - LOG_LEVEL=${LOG_LEVEL:-error}
      - CACHE_DRIVER=${CACHE_DRIVER:-file}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mailpit:
    image: 'axllent/mailpit:latest'
    profiles:
      - with-mail
    ports:
      - "${PORT_MAILPIT_SMTP:-8125}:1025"
      - "${PORT_MAILPIT_UI:-8180}:8025"

  db:
    image: mysql:8.0
    profiles:
      - with-db
    ports:
      - "${PORT_DB:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
