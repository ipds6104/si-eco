services:
  app:
    build:
      context: .
      target: ${DOCKER_TARGET:-base}
    image: si-aksi-app
    restart: always
    ports:
      - "${PORT_APP:-8100}:80"
    # Volumes dihapus untuk produksi agar tidak menimpa kode di dalam image (100% Sembuh)
    # volumes:
    #   - .:/app
    # Command sekarang dikelola langsung oleh Dockerfile (Production Optimized)
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - SERVER_NAME=:80
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - "${PORT_MAILPIT_SMTP:-8125}:1025"
      - "${PORT_MAILPIT_UI:-8180}:8025"

  db:
    image: mysql:8.0
    profiles:
      - with-db
    ports:
      - "${PORT_DB:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
